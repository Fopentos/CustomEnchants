name: Build Spigot Plugin JAR

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Шаг 1: Скачиваем код из GitHub
      - name: Checkout code
        uses: actions/checkout@v4

      # Шаг 2: Устанавливаем Java 8 (как в pom.xml)
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      # Шаг 3: Собираем JAR файл
      - name: Build with Maven
        run: mvn --batch-mode --update-snapshots clean package

      # Шаг 4: Загружаем готовый JAR как артефакт
      - name: Upload plugin JAR
        uses: actions/upload-artifact@v4
        with:
          name: CustomEnchants-Plugin
          path: target/*.jar
          retention-days: 30

      # Шаг 5: Выводим информацию о готовом файле
      - name: Show build result
        run: ls -lh target/*.jar
